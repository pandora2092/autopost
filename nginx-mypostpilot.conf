# Nginx config для mypostpilot.ru
# Скопировать на сервер: sudo cp nginx-mypostpilot.conf /etc/nginx/sites-available/app
# Путь к проекту на сервере — замени /var/www/app на свой (где лежит клон репо)
# Проверка: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name mypostpilot.ru www.mypostpilot.ru;

    # Статика фронта (Vite собирает в frontend/dist)
    root /var/www/app/frontend/dist;
    index index.html;

    # API — прокси на NestJS (порт 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Стрим экрана VM в браузере (ws-scrcpy). Раскомментировать, если запущен ws-scrcpy на порту 8000.
    # Тогда задать STREAM_WEB_BASE=https://mypostpilot.ru/stream-view (без слэша в конце) в .env бэкенда.
    # location /stream-view/ {
    #     proxy_pass http://127.0.0.1:8000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # Фронт: файлы и SPA fallback без цикла
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        try_files /index.html =404;
    }
}
